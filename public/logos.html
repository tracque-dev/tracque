<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tracque — logo lab</title>
<style>
  body { margin:0; background:#FAF9F7; color:#0A0A0A; font-family:Inter,-apple-system,system-ui,sans-serif; padding:40px; }
  h1 { font-size:20px; margin:0 0 4px; }
  p.sub { color:#8A857C; font-size:13px; margin:0 0 32px; }
  .row { display:flex; align-items:center; gap:40px; padding:20px 0; border-bottom:1px solid #E7E2DB; }
  .label { width:180px; }
  .label .name { font-weight:600; font-size:14px; }
  .label .desc { color:#8A857C; font-size:12px; margin-top:2px; }
  .sizes { display:flex; align-items:center; gap:28px; }
  .badge { background:#0A0A0A; display:flex; align-items:center; justify-content:center; }
  .b56 { width:56px; height:56px; border-radius:14px; }
  .b28 { width:28px; height:28px; border-radius:8px; }
  .b18 { width:18px; height:18px; border-radius:5px; }
  .wordmark { display:flex; align-items:center; gap:10px; }
  .wordmark span { font-weight:700; font-size:18px; letter-spacing:-0.02em; }
  .sz { font-size:10px; color:#bbb; text-align:center; margin-top:6px; font-family:monospace; }
  svg { display:block; }
</style>
</head>
<body>
<h1>Tracque logo options</h1>
<p class="sub">Each shown at 56 / 28 / 18px (nav uses ~28) and as a wordmark. Pick one (or mix-and-match).</p>
<div id="lab"></div>

<script>
// Each option returns the INNER svg markup (viewBox 0 0 24 24), white strokes on dark.
const W = 'white', B = '#3B82F6';
const opts = [
  { name: 'A · Perspective tracks', desc: 'Rails converge to a point + shrinking ties. The classic railroad image.',
    svg: `<g fill="none" stroke="${W}" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6.7 20.2 L19.5 7.6" stroke-width="2.1"/>
      <path d="M3.3 15.8 L18.5 6.4" stroke-width="2.1"/>
      <path d="M6.3 13.9 L9.3 17.7" stroke-width="1.7"/>
      <path d="M10.9 11.1 L13.1 13.9" stroke-width="1.7"/>
      <path d="M15.5 8.3 L16.9 10.1" stroke-width="1.7"/>
    </g><circle cx="19" cy="6.7" r="1.3" fill="${B}"/>` },

  { name: 'B · Twin rails', desc: 'Two bold parallel rails climbing right. No ties — cleanest at small sizes.',
    svg: `<g fill="none" stroke="${W}" stroke-linecap="round">
      <path d="M4 18 L18 8" stroke-width="2.5"/>
      <path d="M4 14.2 L18 4.2" stroke-width="2.5"/>
    </g><circle cx="18" cy="4.2" r="1.6" fill="${B}"/>` },

  { name: 'C · Bold zigzag', desc: 'Up / flat / up, but heavier strokes and only 3 ties.',
    svg: `<g fill="none" stroke="${W}" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2.2 18.4 L8 12 L14 12 L19.8 5.6" stroke-width="2.2"/>
      <path d="M4.8 21 L10.2 15.2 L15.2 15.2 L21.4 8.4" stroke-width="2.2"/>
      <path d="M5.4 14.4 L8.4 17.6" stroke-width="1.9"/>
      <path d="M11 11.6 L11 15.6" stroke-width="1.9"/>
      <path d="M16.2 8.2 L19.2 11.2" stroke-width="1.9"/>
    </g><circle cx="20.6" cy="6.9" r="1.3" fill="${B}"/>` },

  { name: 'D · Growth arrow + ties', desc: 'An upward arrow with two crossties — track meets analytics.',
    svg: `<g fill="none" stroke="${W}" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 19 L18.5 5.5" stroke-width="2.6"/>
      <path d="M18.5 5.5 L12.5 6" stroke-width="2.6"/>
      <path d="M18.5 5.5 L18 11.5" stroke-width="2.6"/>
      <path d="M7.8 15 L10.4 17.6" stroke-width="1.9"/>
      <path d="M11.6 11.2 L14.2 13.8" stroke-width="1.9"/>
    </g>` },

  { name: 'E · Rising line', desc: 'A clean ascending data line + node. Pure analytics, no tracks.',
    svg: `<g fill="none" stroke="${W}" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 17 L10 12 L14 14 L20 6" stroke-width="2.5"/>
    </g><circle cx="20" cy="6" r="1.7" fill="${B}"/>` },
];

const lab = document.getElementById('lab');
const wrap = (inner, size) => `<svg width="${size}" height="${size}" viewBox="0 0 24 24"><g transform="scale(0.66) translate(6.2,6.2)">${inner}</g></svg>`;
// scale the 24-box art to ~66% inside the badge with centering
const badge = (inner, cls, px) => `<div><div class="badge ${cls}">${wrap(inner, px)}</div><div class="sz">${px}px</div></div>`;

for (const o of opts) {
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `
    <div class="label"><div class="name">${o.name}</div><div class="desc">${o.desc}</div></div>
    <div class="sizes">
      ${badge(o.svg, 'b56', 56)}
      ${badge(o.svg, 'b28', 28)}
      ${badge(o.svg, 'b18', 18)}
      <div class="wordmark"><div class="badge b28">${wrap(o.svg, 28)}</div><span>Tracque</span></div>
    </div>`;
  lab.appendChild(row);
}
</script>
</body>
</html>
